<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Atlas - Interactif</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <nav>
            <div class="logo">World Atlas</div>
            <ul>
                <li><a href="#" class="active">Home</a></li>
                <li><a href="#">Countries</a></li>
                <li><a href="#">Regions</a></li>
                <li><a href="#">About</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- Formulaire de recherche -->
        <section class="search-section">
            <form id="search-form" novalidate>
                <div class="input-group">
                    <input type="text" id="country-input" placeholder="Saisir le nom d'un pays... (ex: Haiti)">
                    <button type="submit">Rechercher</button>
                </div>
                <!-- Mesaj erè validation an -->
                <p id="error-message" class="error-text" hidden></p>
            </form>
        </section>

        <!-- Indicateur de Chargement (Spinner) -->
        <div id="loading-spinner" class="spinner" hidden>
            <div class="double-bounce1"></div>
            <div class="double-bounce2"></div>
            <p>Chargement en cours...</p>
        </div>

        <!-- Zone d'affichage des résultats -->
        <section id="result-section" class="result-section" hidden>
            <div class="country-card">
                <div class="flag-container">
                    <img id="country-flag" src="" alt="">
                </div>
                <div class="info-container">
                    <h2 id="country-name"></h2>
                    <div class="info-grid">
                        <div class="info-item"><strong>Capitale:</strong> <span id="country-capital"></span></div>
                        <div class="info-item"><strong>Population:</strong> <span id="country-population"></span></div>
                        <div class="info-item"><strong>Région:</strong> <span id="country-region"></span></div>
                        <div class="info-item"><strong>Monnaie:</strong> <span id="country-currency"></span></div>
                        <div class="info-item"><strong>Langues:</strong> <span id="country-languages"></span></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 ISTEAH - LOG3500. Tous droits réservés.</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
