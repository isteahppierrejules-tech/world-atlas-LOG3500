<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard - LOG3500</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <nav>
            <div class="logo">☁️ Weather Dashboard</div>
            <ul>
                <li><a href="#" class="active">Dashboard</a></li>
                <li><a href="#">Forecast</a></li>
                <li><a href="#">Map</a></li>
                <li><a href="#">Alerts</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- Seksyon Chèche a -->
        <section class="search-section">
            <form id="search-form">
                <div class="search-group">
                    <input type="text" id="country-input" placeholder="Entrez le nom d'une ville (ex: Jacmel)..." autocomplete="off">
                    <button type="submit">Rechercher</button>
                </div>
                <p id="error-message" class="error-msg" hidden></p>
            </form>
        </section>

        <!-- Spinner pou Loading -->
        <div id="loading-spinner" class="spinner-container" hidden>
            <div class="spinner"></div>
            <p>Chargement des conditions météo...</p>
        </div>

        <!-- Seksyon Kat Rezilta Météo (Egzakteman tankou makèt la) -->
        <section id="result-section" class="result-container">
            <div class="weather-card">
                <div class="location-header">
                    <span class="geo-icon">📍</span>
                    <h2 id="country-name">Jacmel, Haiti</h2>
                </div>
                <p class="current-label">Current Weather</p>

                <!-- Ti solèy / nwaj dinamik -->
                <div class="weather-icon-center">☀️</div>
                
                <!-- Gwo chif Tanperati a nan mitan -->
                <div class="temperature-container">
                    <span id="country-capital" class="temperature">21.5°C</span>
                </div>

                <!-- Liy anba a ki separe an de blòk -->
                <div class="weather-meta">
                    <div class="meta-item condition-box">
                        <span class="meta-icon">⛅</span>
                        <span id="country-region" class="meta-value">Partly Cloudy</span>
                    </div>
                    <div class="meta-item wind-box">
                        <span class="meta-icon">💨</span>
                        <div>
                            <p id="country-population" class="meta-value">14.2 km/h</p>
                            <p class="meta-sub">Wind Speed</p>
                        </div>
                    </div>
                </div>

                <p class="update-time">🕒 Updated just now</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 - Pierre Jules Pharah | DUT en TIC - ISTEAH</p>
    </footer>

</body>
</html>
